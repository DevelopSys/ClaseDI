<h2>Agregar tarea</h2>

<input class="form-control mb-3" placeholder="introduce titulo tarea" [(ngModel)]="titulo" />
<input
  class="form-control mb-3"
  placeholder="introduce responsable tarea"
  [(ngModel)]="responsable"
/>
<input
  class="form-control mb-3"
  placeholder="introduce fecga tarea"
  [(ngModel)]="fecha"
  type="date"
/>

<select class="form-select mb-4" [(ngModel)]="prioridad">
  <option value="0">Indica la prioridad</option>
  <option value="1">Baja</option>
  <option value="2">Media</option>
  <option value="3">Alta</option>
</select>

<button class="btn btn-primary w-100" (click)="procesarTarea()">Enviar</button>
