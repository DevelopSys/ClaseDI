<h2>Lista de tareas</h2>
<div class="row row-cols-1 row-cols-md-4 g-6">
  @for (item of listaTareas; track $index) {
    <div class="col">
      <div class="card">
        <img [src]="item.prioridad | imagenes" class="card-img-top" alt="..." />
        <div class="card-body">
          <h5 class="card-title">{{ item.titulo | uppercase }}</h5>
          <p>
            {{ item.responsable }}
          </p>
          <p>
            {{ item.fecha | date | uppercase }}
          </p>
          <button class="btn btn-primary w-100">Ver detalle</button>
        </div>
      </div>
    </div>
  }
</div>
